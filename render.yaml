services:
  - type: web
    name: vidiflow-media-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --timeout 60 --bind 0.0.0.0:$PORT
    envVars:
      - key: API_SECRET
        generateValue: true
      - key: YOUTUBE_COOKIES
        sync: false
      - key: INSTAGRAM_COOKIES
        sync: false
    healthCheckPath: /